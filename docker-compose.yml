services:
  db:
    image: postgres:15-alpine
    container_name: ai-job-agent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ai_job_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_job_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-job-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── S3-compatible local storage ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ai-job-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ai-job-agent-minio-init
    depends_on:
      minio:
        condition: service_healthy  
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET_NAME:-ai-job-agent};
        echo 'MinIO bucket ready.';
      "
    restart: "no"

  brain-engine:
    build:
      context: ./brain-engine
      dockerfile: Dockerfile
    container_name: brain-engine
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2
    ports:
      - "8000:8000"
    volumes:
      - ./brain-engine/resumes:/usr/src/app/brain-engine/resumes
      - ./storage:/usr/src/app/storage
    restart: unless-stopped

  automation-engine:
    build:
      context: ./automation-engine
      dockerfile: Dockerfile
    container_name: automation-engine
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/ai_job_agent?schema=public
      - REDIS_URL=redis://redis:6379
      - BRAIN_ENGINE_URL=http://brain-engine:8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY}
      - ADZUNA_COUNTRY=${ADZUNA_COUNTRY:-us}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFY_TO_EMAIL=${NOTIFY_TO_EMAIL}
      - LINKEDIN_AUTOMATION_ENABLED=false
      - PLAYWRIGHT_HEADLESS=${PLAYWRIGHT_HEADLESS:-true}
      - CANDIDATE_FIRST_NAME=${CANDIDATE_FIRST_NAME}
      - CANDIDATE_LAST_NAME=${CANDIDATE_LAST_NAME}
      - CANDIDATE_EMAIL=${CANDIDATE_EMAIL}
      - CANDIDATE_PHONE=${CANDIDATE_PHONE}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-ai-job-agent}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - PREMIUM_DAILY_LIMIT=${PREMIUM_DAILY_LIMIT:-50}
      - DEFAULT_USER_ID=${DEFAULT_USER_ID}
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./storage:/usr/src/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      brain-engine:
        condition: service_started
      minio:
        condition: service_healthy  
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        AUTOMATION_ENGINE_URL: http://localhost:3001
        NEXTAUTH_URL: http://localhost:3002
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    container_name: ai-job-agent-frontend
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTOMATION_ENGINE_URL=http://automation-engine:3001
    ports:
      - "3002:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data: