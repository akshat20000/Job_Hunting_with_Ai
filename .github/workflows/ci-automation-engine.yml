name: CI - Automation Engine

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'automation-engine/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'automation-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: automation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'automation-engine/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./automation-engine

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./automation-engine

      - name: Run Migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/automation_test
        run: npx prisma migrate deploy
        working-directory: ./automation-engine

      - name: Run Linter & Tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/automation_test
          REDIS_URL: redis://localhost:6379
        run: |
          npm run lint
          npm run test
        working-directory: ./automation-engine