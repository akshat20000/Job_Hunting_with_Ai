name: CI - Brain Engine

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'brain-engine/**'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'brain-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies (LaTeX)
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r brain-engine/requirements.txt
          pip install -r brain-engine/requirements-dev.txt

      - name: Run Pytest
        run: pytest
        working-directory: ./brain-engine