name: CI - Brain Engine

on:
  push:
    branches: [ main ]
    paths:
      - 'brain-engine/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'brain-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./brain-engine

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'brain-engine/requirements*.txt'

      - name: Cache HuggingFace embedding model
        # sentence-transformers downloads all-MiniLM-L6-v2 (~80MB) on first
        # use. pip's cache does not cover this, so without a dedicated cache
        # every CI run re-downloads the model from the Hub.
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Brain Engine Tests
        run: python -m pytest
        env:
          PYTHONPATH: .
          TESTING: "True"